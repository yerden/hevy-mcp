services:
  test:
    image: golang:1.25-alpine
    network_mode: host
    working_dir: /src
    volumes:
      - .:/src
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    environment:
      - CGO_ENABLED=0
    command: go test ./...

  hevy-mcp:
    build: .
    image: hevy-mcp:latest
    environment:
      - HEVY_API_KEY=${HEVY_API_KEY:-}
    command: ["--transport=http", "--port=8080"]
    ports:
      - "8080:8080"
    stdin_open: true
    tty: true

volumes:
  go-mod-cache:
  go-build-cache:
